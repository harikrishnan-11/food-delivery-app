<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly food - Create Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="page-shell">
        <div class="glass-card signup-card">
            <div class="card-header">
                <div class="brand-pill signup-pill">
                    <span><img src="./Assets/Stackly logo-100kb.webp" alt=""></span>
                </div>
                <h1>Create account</h1>
                <p>Join Foodora to get fast delivery from top restaurants.</p>
            </div>

            <form class="auth-form">
             <div class="input-group">
    <label>Full Name</label>

    <input
        type="text"
        id="fullName"
        placeholder="Enter your full name"
        required
    >
</div>
                 <div class="input-group"> 
    <label>Role</label>

    <select name="role" id="role" required>
        <option value="" selected disabled>
            Select Role
        </option>

        <option value="Customer">
            Customer
        </option>

        <option value="Delivery">
            Delivery Partner
        </option>

        <option value="Hotel">
            Hotel
        </option>
    </select>
</div>
                <div class="input-group">
    <label>Phone Number</label>

    <input
        type="tel"
        id="phoneNumber"
        placeholder="Enter your phone number"
        maxlength="10"
        required
    >
</div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
    <label>Password</label>

    <div class="password-field">

        <input
            type="password"
            id="signupPassword"
            placeholder="Create a password"
            required
            autocomplete="off"
        >

        <button type="button" class="toggle-password" id="toggleSignupPassword">
            <i class="fas fa-eye"></i>
        </button>

    </div>
</div>

<div class="input-group">
    <label>Confirm Password</label>

    <div class="password-field">

        <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm your password"
            required
            autocomplete="off"
        >

        <button type="button" class="toggle-password" id="toggleConfirmPassword">
            <i class="fas fa-eye"></i>
        </button>

    </div>
</div>

                <div class="terms-row">
                    <label class="checkbox-label">
                        <input type="checkbox" required>
                        <span>I agree to the <a href="./404.html">Terms & Conditions</a></span>
                    </label>
                </div>
                <div class="receive-updates">
                    <input type="checkbox" id="updates" required>
                    <label for="updates">I wish to receive promotions and updates</label>
                </div>
                <a href="./index.html">
                    <button type="submit" class="main-btn">CREATE ACCOUNT</button>
                </a>

                <div class="social-divider">or continue with</div>

               <div class="social-row">
                    <a href="./404.html">
                        <button type="button" class="social-btn google"><i class="fab fa-google"></i></button>
                    </a>
                    <a href="./404.html">
                        <button type="button" class="social-btn facebook"><i class="fab fa-facebook-f"></i></button>
                    </a>
                    <a href="./404.html">
                        <button type="button" class="social-btn apple"><i class="fab fa-apple"></i></button>
                    </a>
                </div>

                <div class="footer-note">
                    Already have an account? <a href="index.html">Log In</a>
                </div>
            </form>
        </div>
    </div>
<script>

/* PASSWORD TOGGLE FUNCTION */

function setupPasswordToggle(buttonId, inputId){

    const toggleBtn =
    document.getElementById(buttonId);

    const passwordInput =
    document.getElementById(inputId);

    toggleBtn.addEventListener('click', () => {

        if(passwordInput.type === 'password'){

            passwordInput.type = 'text';

            toggleBtn.innerHTML =
            '<i class="fas fa-eye-slash"></i>';

        } else {

            passwordInput.type = 'password';

            toggleBtn.innerHTML =
            '<i class="fas fa-eye"></i>';

        }

    });

}
/* MOBILE NUMBER VALIDATION */

/* ONLY NUMBERS FOR PHONE */

const phoneInput =
document.getElementById('phoneNumber');

phoneInput.addEventListener('input', () => {

    phoneInput.value =
    phoneInput.value.replace(/\D/g, '');

});
/* ENABLE PASSWORD TOGGLES */

setupPasswordToggle(
    'toggleSignupPassword',
    'signupPassword'
);

setupPasswordToggle(
    'toggleConfirmPassword',
    'confirmPassword'
);


/* CREATE ERROR ELEMENTS */

const fullNameInput =
document.getElementById('fullName');

const passwordInput =
document.getElementById('signupPassword');

const confirmPasswordInput =
document.getElementById('confirmPassword');

const form =
document.querySelector('.auth-form');


/* VALIDATION */

form.addEventListener('submit', function(e){

    e.preventDefault();

    removeErrors();

    let isValid = true;

    /* NAME VALIDATION */

    const fullName =
    fullNameInput.value.trim();

    const namePattern =
    /^[A-Za-z\s]+$/;

    if(!namePattern.test(fullName)){

        showError(
            fullNameInput,
            'Name should contain only letters and spaces.'
        );

        isValid = false;
    }

    /* PASSWORD MATCH */

    if(
        passwordInput.value !==
        confirmPasswordInput.value
    ){

        showError(
            confirmPasswordInput,
            'Passwords do not match.'
        );

        isValid = false;
    }

    /* SUCCESS */

    if(isValid){

        window.location.href =
        'index.html';

    }

});


/* SHOW ERROR */
function showError(input, message){

    const error =
    document.createElement('small');

    error.className =
    'error-message';

    error.innerText =
    message;

    /* PASSWORD FIELD FIX */

    if(input.parentElement.classList.contains('password-field')){

        input.parentElement.parentElement
        .appendChild(error);

    } else {

        input.parentElement
        .appendChild(error);

    }

}
/* REMOVE ERRORS */

function removeErrors(){

    document
    .querySelectorAll('.error-message')
    .forEach(error => {

        error.remove();

    });

}

</script>
</body>
</html>
