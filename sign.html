<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly food - Create Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="page-shell">
        <div class="glass-card signup-card">
            <div class="card-header">
                <div class="brand-pill signup-pill">
                    <span><img src="./Assets/Stackly logo-100kb.webp" alt=""></span>
                </div>
                <h1>Create account</h1>
                <p>Join Foodora to get fast delivery from top restaurants.</p>
            </div>

            <form class="auth-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your full name" required>
                </div>
                 <div class="input-group"> 
                    <label>Role</label>
                    <select name="role" id="role" required  >
                        <option value="Customer">Customer</option>
                        <option value="Delivery">Delivery Partner</option>
                        <option value="Hotel">Hotel</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="Enter your phone number" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Create a password" required>
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="Confirm your password" required>
                </div>

                <div class="terms-row">
                    <label class="checkbox-label">
                        <input type="checkbox" required>
                        <span>I agree to the <a href="./404.html">Terms & Conditions</a></span>
                    </label>
                </div>
                <div class="receive-updates">
                    <input type="checkbox" id="updates" required>
                    <label for="updates">I wish to receive promotions and updates</label>
                </div>

                <button type="submit" class="main-btn">CREATE ACCOUNT</button>

                <div class="social-divider">or continue with</div>

               <div class="social-row">
                    <a href="./404.html">
                        <button type="button" class="social-btn google"><i class="fab fa-google"></i></button>
                    </a>
                    <a href="./404.html">
                        <button type="button" class="social-btn facebook"><i class="fab fa-facebook-f"></i></button>
                    </a>
                    <a href="./404.html">
                        <button type="button" class="social-btn apple"><i class="fab fa-apple"></i></button>
                    </a>
                </div>

                <div class="footer-note">
                    Already have an account? <a href="index.html">Log In</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
