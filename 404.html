<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0c0214;
    width:100%;
    height:100vh;
}

a{
    text-decoration: none;
}
/* SECTION */
section{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:40px;
    padding:20px;
    text-align:center;
}

/* IMAGE */
img{
    max-width:500px;
    width:100%;
    height:auto;
}

/* BUTTON CONTAINER */
.container{
    display:flex;
    justify-content:center;
}

/* BUTTON */
.button{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 20px;
    background: #FF6B2C;
    border-radius:12px;
    color:white;
    cursor:pointer;
    transition:0.3s ease;
}

.button:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 20px rgba(255, 255, 255, 0.3);
}
#icon{
    color: white;
}

/* TEXT */
.button h3{
    font-size:18px;
    font-weight:500;
}

/* RESPONSIVE */

/* Tablet */
@media screen and (max-width:900px){
    img{
        max-width:300px;
    }

    .button h3{
        font-size:16px;
    }
}

/* Mobile */
@media screen and (max-width:500px){
    section{
        gap:25px;
    }

    img{
        max-width:220px;
    }

    .button{
        padding:10px 16px;
    }

    .button h3{
        font-size:14px;
    }

}
</style>

</head>

<body>

<section>
    <div class="image">
        <img src="./Assets/image-100kb.webp" alt="404 image">
    </div>

    <div class="container">
        <a href="./index.html">
            <div class="button">
                <h3>Go back to Login</h3>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none">
                    <path stroke="white" stroke-width="2" d="M19 12H5m14 0-4 4m4-4-4-4"/>
                </svg>
            </div>
        </a>
    </div>
    <div class="fa-solid fa-mug-hot" id="icon"></div>
</section>

</body>
</html>
