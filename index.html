<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly food - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <video autoplay muted loop playsinline id="background-video">
  <source src="./Assets/Untitled design.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>
    <main>

        <div class="card-container">
            <div class="card-header">
                <div class="brand-pill">
                    <span><img src="./Assets/Stackly logo-100kb.webp" alt=""></span>
                </div>
                <h1>Welcome back</h1>
                <p>Login to order your favorite meals in seconds.</p>
            </div>

            <form class="auth-form">
                <div class="input-group">
    <label>Email Address</label>

    <input
        type="email"
        id="emailAddress"
        placeholder="Enter your email"
        required
    >
</div>
                <div class="input-group">
                    <label>Role</label>
                    <select name="role" id="role"  required>
                        <option value="" selected disabled>Select Role</option>
                        <option value="Customer">Customer</option>
                        <option value="Hotel">Hotel Admin</option>
                        <option value="Delivery">Delivery Partner</option>
                    </select>
                </div>
               <div class="input-group">
    <label>Password</label>

    <div class="password-field">

        <input
            type="password"
            id="password"
            placeholder="Enter your password"
            required
            autocomplete="off"
        >

        <button type="button" class="toggle-password" id="togglePassword">
            <i class="fas fa-eye"></i>
        </button>

    </div>
</div>
<div class="action-row remember-row">

    <label class="remember-me">
        <input type="checkbox" id="rememberMe">
        <span>Remember Me</span>
    </label>

    <a href="./404.html">Forgot Password?</a>

</div>
    

                <button type="submit" class="main-btn">LOG IN</button>

                <div class="social-divider">or continue with</div>

                <div class="social-row">
                    <a href="./404.html">
                        <button type="button" class="social-btn google"><i class="fab fa-google"></i></button>
                    </a>
                    <a href="./404.html">
                        <button type="button" class="social-btn facebook"><i class="fab fa-facebook-f"></i></button>
                    </a>
                    <a href="./404.html">
                        <button type="button" class="social-btn apple"><i class="fab fa-apple"></i></button>
                    </a>
                </div>

                <div class="footer-note">
                    Don’t have an account? <a href="sign.html">Sign Up</a>
                </div>
            </form>
        </div>
    </main>
    <script>
document.querySelector('.auth-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const email =
    document.getElementById('emailAddress').value;

    sessionStorage.setItem('userEmail', email);

    const role =
    document.getElementById('role').value;

    if (role === 'Customer') {

        window.location.href =
        'Dashboard-Customer.html';

    } else if (role === 'Delivery') {

        window.location.href =
        'Dashboard-DeliveryPartner.html';

    } else if (role === 'Hotel') {

        window.location.href =
        'Dashboard-Hotel.html';

    } else {

        alert('Please select a role.');
    }
});


/* PASSWORD SHOW/HIDE */

const togglePassword =
document.getElementById('togglePassword');

const password =
document.getElementById('password');

togglePassword.addEventListener('click', () => {

    if(password.type === 'password'){

        password.type = 'text';

        togglePassword.innerHTML =
        '<i class="fas fa-eye-slash"></i>';

    } else {

        password.type = 'password';

        togglePassword.innerHTML =
        '<i class="fas fa-eye"></i>';
    }

});


/* EMAIL VALIDATION */

const emailInput =
document.getElementById('emailAddress');

emailInput.addEventListener('input', () => {

    /* REMOVE OLD ERROR */

    const existingError =
    emailInput.parentElement
    .querySelector('.error-message');

    if(existingError){

        existingError.remove();
    }

    const email =
    emailInput.value.trim();

    const emailPattern =
    /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.(com|in)$/;

    /* SHOW ERROR ONLY WHEN USER TYPES */

    if(
        email.length > 0 &&
        !emailPattern.test(email)
    ){

        showError(
            emailInput,
            'Email must end with .com or .in'
        );
    }

});


/* SHOW ERROR FUNCTION */

function showError(input, message){

    const error =
    document.createElement('small');

    error.className = 'error-message';

    error.style.color = 'red';

    error.style.marginTop = '5px';

    error.innerText = message;

    input.parentElement.appendChild(error);
}
</script>
</body>
</html>
